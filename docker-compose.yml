services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapiapp-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend/talentspark
      dockerfile: Dockerfile
    container_name: talentspark-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:5173"
    depends_on:
      - backend